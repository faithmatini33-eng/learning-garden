<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Garden 🌻 — 2nd Grade Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🌻</div>
        <h1>Learning Garden<small>grow a little every day</small></h1>
      </div>
      <button class="kid-chip" id="kidChip" style="display:none"></button>
    </header>
    <main id="app"></main>
  </div>

  <nav class="tabbar" id="tabbar" style="display:none">
    <button data-view="today"><span class="ico">🏡</span>Today</button>
    <button data-view="practice"><span class="ico">🌱</span>Practice</button>
    <button data-view="plan"><span class="ico">🗓️</span>My Week</button>
    <button data-view="progress"><span class="ico">🌟</span>Progress</button>
    <button data-view="helper"><span class="ico">🦉</span>Tutor</button>
  </nav>

  <canvas id="confetti"></canvas>

  <script src="js/generators.js"></script>
  <script src="js/ela.js"></script>
  <script src="js/science.js"></script>
  <script src="js/spanish.js"></script>
  <script src="js/social.js"></script>
  <script src="js/typing.js"></script>
  <script src="js/sprint.js"></script>
  <script src="js/coach.js"></script>
  <script src="js/custom.js"></script>
  <script src="js/paper.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
