  <script>
    // offline app shell — real hosting (https) only; localhost dev stays
    // cache-free unless you opt in with ?pwa=1. No-op on file://.
    if ('serviceWorker' in navigator &&
        (location.protocol === 'https:' || (location.hostname === 'localhost' && location.search.includes('pwa=1')))) {
      addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
